project:
  name: fundscore
  version: "0.2.0"
  tagline: "Lighthouse for repos"
  description: "Deterministic investor-readiness scoring for GitHub repositories. No-LLM CLI tool + GitHub Action + MCP server. Scores 0-100 across three dimensions."
  license: MIT
  author: SunrisesIllNeverSee

locations:
  npm: "https://www.npmjs.com/package/fundscore"
  github: "https://github.com/SunrisesIllNeverSee/fundscore"
  local: "/Users/dericmchenry/Desktop/Desktop Storage/coding/GitHub/fundscore"
  published_version: "0.2.0"
  published_date: "2026-07-07"

status:
  phase: "Phase 2.5 complete — paused"
  tests: "67/67 passing (43 core + 24 MCP)"
  commits: 4 new commits on main (ea381c4, ace9cb2, 9e2b2a0, plus initial)
  pushed: true
  published: true
  working: true
  blocked: false
  paused: true
  pause_reason: "Exploring integration with SigRank ecosystem"

architecture:
  language: "Node.js (CommonJS)"
  engine_version: ">=18"
  dependencies:
    runtime:
      - "@modelcontextprotocol/sdk ^1.29.0"
      - "js-yaml ^4.1.0"
    dev:
      - "eslint ^8.57.0"
      - "jest ^29.7.0"
  package_size: "27.0 kB (16 files)"
  entry_points:
    cli: "bin/fundscore.js"
    mcp: "bin/fundscore.js mcp"
    api: "src/core/index.js → score(repoRoot)"

dimensions:
  artifacts:
    weight: 0.5
    scale: "0-100"
    checks: 18
    check_ids:
      - readme-exists
      - readme-oneliner
      - readme-cta
      - readme-demo
      - deployed-url
      - funding-or-roadmap
      - market-comps
      - risks-honest
      - license
      - tests-or-ci
      - security
      - contact-team
      - audience-customer
      - changelog
      - contributing
      - architecture
      - git-activity
      - contributor-count
    new_checks_in_v02:
      - deployed-url
      - changelog
      - contributing
      - architecture
      - git-activity
      - contributor-count
    multi_language_tests: ["JS", "Python", "Rust", "Go", "Ruby", "Java"]

  business_viability:
    weight: 0.3
    scale: "0-100"
    checks: 7
    check_ids:
      - monetization-clarity
      - recession-resilience
      - pricing-power
      - tech-enabled-margins
      - contingency-depth
      - market-evidence
      - traction-evidence
    framing: "Does your repo communicate the signals investors look for? (not 'we evaluate your business')"
    asterisk: "Snapshot of repo-readiness signals, not a business valuation"

  quality:
    weight: 0.2
    scale: "0-100"
    dimensions:
      - readability (Flesch Reading Ease)
      - specificity (concrete numbers/metrics)
      - structure (headings/lists/code blocks)
      - length (not too sparse/padded)
      - consistency (no contradicting numbers)

round_reports:
  rounds: ["pre-seed", "seed", "series-a", "grant", "unknown"]
  structure: "required (60%) + expected (30%) + bonus (10%)"
  source: "General VC knowledge (not from rokrev/CIVITAE)"

cli_commands:
  - command: "fundscore"
    description: "Score current repo (summary output)"
  - command: "fundscore --md"
    description: "Full markdown report"
  - command: "fundscore --json"
    description: "JSON output"
  - command: "fundscore --fail-below 50"
    description: "Exit 1 if score < 50"
  - command: "fundscore fix"
    description: "Show scaffold plan (dry run)"
  - command: "fundscore fix --apply"
    description: "Create missing doc templates"
  - command: "fundscore fix --apply --force"
    description: "Overwrite existing docs"
  - command: "fundscore history"
    description: "Show score over time"
  - command: "fundscore history --save"
    description: "Save current score as snapshot"
  - command: "fundscore badge"
    description: "Output SVG badge"
  - command: "fundscore badge --embed"
    description: "Output markdown badge snippet"
  - command: "fundscore badge --save"
    description: "Save SVG badge to repo"
  - command: "fundscore mcp"
    description: "Start MCP server (stdio) for AI agent integration"

mcp_server:
  status: "built and published"
  transport: "stdio"
  tools:
    - name: score_repo
      description: "Score a repo, return agent-optimized report. Auto-saves snapshot."
      params: ["repoPath (optional)"]
      returns: "overallScore, dimensions, round analysis, topFixes, missingChecks, snapshotSaved, asterisk"
    - name: get_fix_plan
      description: "Get scaffold plan for missing docs (read-only)"
      params: ["repoPath (optional)"]
      returns: "currentScore, files[], totalPotentialGain"
    - name: apply_fixes
      description: "Create template files for missing docs"
      params: ["repoPath (optional)", "dryRun (default: true)", "force (default: false)"]
      returns: "written, skipped, previousScore, newScore, scoreDelta"
  auto_save: true
  auto_save_config: ".fundscore.yml → history.autoSave: false to disable"
  deterministic_advantage: "AI agent calling LLM scorer is circular. AI agent calling fundscore is asking a deterministic audit tool."

github_action:
  status: "workflow exists, untested in real CI"
  file: ".github/workflows/fundscore.yml"
  behavior:
    pull_request: "Posts markdown report as PR comment"
    push: "Uploads fundscore-report.json as artifact (30-day retention)"
  token: "GITHUB_TOKEN only (no extra secrets)"

templates:
  scaffoldable_docs:
    - FUNDING.md
    - ROADMAP.md
    - RISKS.md
    - SECURITY.md
    - CONTRIBUTING.md
    - CHANGELOG.md
    - COMPARABLES.md
  check_to_template_map:
    funding-or-roadmap: [FUNDING.md, ROADMAP.md]
    risks-honest: [RISKS.md]
    security: [SECURITY.md]
    contributing: [CONTRIBUTING.md]
    changelog: [CHANGELOG.md]
    market-comps: [COMPARABLES.md]

configuration:
  file: ".fundscore.yml"
  fields:
    lens.round: "pre-seed | seed | series-a | grant"
    lens.checkSize: "string"
    lens.teamMode: "solo | small-team | operating-team"
    lens.naics: "string"
    weights: "override artifact check weights by ID"
    businessWeights: "override business check weights by ID"
    required: "mark checks as required"
    scoring.artifactsWeight: "default 0.5"
    scoring.businessWeight: "default 0.3"
    scoring.qualityWeight: "default 0.2"
    thresholds.warn: "default 50"
    thresholds.fail: "default 30"
    history.autoSave: "default true"

files:
  core:
    - src/core/index.js (entry point, exports score)
    - src/core/scorer.js (main scoring orchestration, path validation, 3-dimension aggregation)
    - src/core/rubric.js (18 artifact checks, multi-language test detection, git activity)
    - src/core/business.js (7 business viability checks)
    - src/core/quality.js (5 heuristic quality dimensions)
    - src/core/lens.js (investor lens inference: round, check size, team mode, NAICS)
    - src/core/lens-report.js (round-specific gap analysis, required/expected/bonus)
    - src/core/format.js (markdown + summary output, 0-100 scale, asterisk)
    - src/core/templates.js (7 scaffold templates + check-to-template mapping)
    - src/core/loader.js (file reading, listing, overrides)
  mcp:
    - src/mcp/server.js (stdio MCP server, 3 tools, auto-save snapshots)
  cli:
    - bin/fundscore.js (CLI entry: score, fix, history, badge, mcp)
  tests:
    - tests/core.test.js (43 tests)
    - tests/mcp.test.js (24 tests)
  docs:
    - README.md (full documentation)
    - FIXES.md (4 bugs + business viability proposal)
    - RESEARCH.md (competitive landscape + R&D analysis)
    - PLAN.md (Phase 0-5 playbook with feedback loops)
  config:
    - .fundscore.example.yml
    - .github/workflows/fundscore.yml
  archived:
    - rokrev.archived (original research notes, moved out of active path)

