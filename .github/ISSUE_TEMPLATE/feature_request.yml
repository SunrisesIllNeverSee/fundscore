name: Feature Request
description: Suggest a feature for fundscore
title: "[FEATURE]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP server
        - Scoring engine
        - New check / dimension
        - --fix mode
        - Score history
        - Badge generation
        - GitHub Action
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
